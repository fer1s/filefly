name: Build macOS (Apple Silicon)

# Builds the unsigned Apple Silicon (arm64) .dmg. Built ON macOS 14 (Sonoma) with a minimum system
# version of 14.0 (see tauri.conf.json > bundle.macOS), so the SINGLE arm64 .dmg runs on both
# Sonoma (macOS 14) and Sequoia (macOS 15) — no separate per-OS build is needed. Runs when you
# publish a GitHub Release (the .dmg is attached to it), or manually from the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: build-macos-arm-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # attach the .dmg to the release

jobs:
  build:
    # Sonoma Apple Silicon runner. Building on the OLDER supported OS maximises forward
    # compatibility: the resulting arm64 binary also runs on Sequoia.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the `sfb` CLI and stage it as a sidecar so the .app embeds it at Contents/MacOS/sfb.
      # Must run before `tauri build` and target the same triple the DMG is built for.
      - name: Build sfb sidecar (aarch64)
        run: ./scripts/build-sfb-sidecar.sh aarch64-apple-darwin

      - name: Build DMG (aarch64)
        run: pnpm tauri build --target aarch64-apple-darwin --bundles dmg

      # Manual runs have no release to attach to → keep the .dmg as a downloadable artifact.
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: sito-file-browser-macos-arm
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      # Release runs → attach the .dmg to the published release.
      - name: Attach DMG to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
