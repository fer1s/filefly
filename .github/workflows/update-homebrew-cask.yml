name: Update Homebrew Cask

# On a published Release, wait for both the Intel and Apple-Silicon .dmgs to be attached (they come
# from build-macos-intel.yml and build-macos-arm.yml), compute their sha256 sums, regenerate the
# Cask, and push it to the Homebrew tap repo. End users then get the update via `brew upgrade`.
#
# Prerequisites (one-time):
#   1. Create the tap repo:  github.com/sito8943/homebrew-tap  (empty is fine).
#   2. Add a repo secret TAP_GITHUB_TOKEN — a PAT (fine-grained or classic) with Contents:write on
#      that tap repo. The default GITHUB_TOKEN cannot push to another repo.
#   3. Users install with:  brew install --cask sito8943/tap/sito-file-browser
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v0.3.0)
        required: true

concurrency:
  group: update-homebrew-cask
  cancel-in-progress: false

env:
  TAP_REPO: sito8943/homebrew-tap
  CASK_NAME: sito-file-browser

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for the cask template)
        uses: actions/checkout@v4

      - name: Resolve tag and version
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $TAG (version $VERSION)"

      # The two build workflows run on the same release event; wait until both .dmgs are attached
      # before computing sums, so this job doesn't race ahead of the builds.
      - name: Wait for both DMG assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          for i in $(seq 1 60); do   # up to ~30 min (60 * 30s)
            NAMES="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name' 2>/dev/null || true)"
            HAS_X64=$(echo "$NAMES" | grep -c '_x64\.dmg$' || true)
            HAS_ARM=$(echo "$NAMES" | grep -c '_aarch64\.dmg$' || true)
            if [ "$HAS_X64" -ge 1 ] && [ "$HAS_ARM" -ge 1 ]; then
              echo "Both DMGs present."; exit 0
            fi
            echo "Waiting for DMGs (x64=$HAS_X64 arm=$HAS_ARM), attempt $i…"; sleep 30
          done
          echo "Timed out waiting for both DMGs to be attached to $TAG"; exit 1

      - name: Download DMGs and compute sha256
        id: sums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          mkdir -p dmg
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*_x64.dmg' --dir dmg
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*_aarch64.dmg' --dir dmg
          SHA_INTEL=$(sha256sum dmg/*_x64.dmg | cut -d' ' -f1)
          SHA_ARM=$(sha256sum dmg/*_aarch64.dmg | cut -d' ' -f1)
          echo "sha_intel=$SHA_INTEL" >> "$GITHUB_OUTPUT"
          echo "sha_arm=$SHA_ARM" >> "$GITHUB_OUTPUT"
          echo "intel=$SHA_INTEL arm=$SHA_ARM"

      # Generate the final cask. Unquoted heredoc so ${...} shell vars expand while Ruby's #{...}
      # interpolation is left literal for Homebrew to resolve at install time.
      - name: Render cask
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHA_ARM: ${{ steps.sums.outputs.sha_arm }}
          SHA_INTEL: ${{ steps.sums.outputs.sha_intel }}
        run: |
          cat > "${CASK_NAME}.rb" <<EOF
          # Auto-generated by .github/workflows/update-homebrew-cask.yml — do not edit by hand.
          cask "${CASK_NAME}" do
            arch arm: "aarch64", intel: "x64"

            version "${VERSION}"
            sha256 arm:   "${SHA_ARM}",
                   intel: "${SHA_INTEL}"

            url "https://github.com/${GITHUB_REPOSITORY}/releases/download/v#{version}/Sito.File.Browser_#{version}_#{arch}.dmg"
            name "Sito File Browser"
            desc "File browser with an AI-friendly \`sfb\` CLI"
            homepage "https://github.com/${GITHUB_REPOSITORY}"

            depends_on macos: ">= :sonoma"

            app "Sito File Browser.app"
            binary "#{appdir}/Sito File Browser.app/Contents/MacOS/sfb", target: "sfb"

            zap trash: [
              "~/Library/Application Support/com.sito8943.file-browser",
              "~/Library/Caches/com.sito8943.file-browser",
            ]
          end
          EOF
          echo "--- rendered cask ---"; cat "${CASK_NAME}.rb"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Commit and push cask
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p tap/Casks
          cp "${CASK_NAME}.rb" "tap/Casks/${CASK_NAME}.rb"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Casks/${CASK_NAME}.rb"
          if git diff --cached --quiet; then
            echo "Cask already up to date; nothing to commit."
          else
            git commit -m "${CASK_NAME} ${VERSION}"
            git push
          fi
